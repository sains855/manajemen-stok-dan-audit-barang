{% macro mobile_stat_card(label, value, icon, color='primary') %}
<div class="col-3">
    <div class="card bg-{{ color }} text-white" style="border-radius: 8px;">
        <div class="card-body text-center p-2">
            <i class="bi bi-{{ icon }}" style="font-size: 1.2rem;"></i>
            <div style="font-size: 0.8rem; font-weight: bold;">{{ value }}</div>
            <small style="font-size: 0.6rem;">{{ label }}</small>
        </div>
    </div>
</div>
{% endmacro %}
